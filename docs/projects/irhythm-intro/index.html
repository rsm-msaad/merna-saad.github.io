<script>
function initTheater() {
  var hasGsap = typeof gsap !== 'undefined';
  var screen = document.getElementById('gs-screen');
  var tlFill = document.getElementById('gs-tl-fill');
  var prevBtn = document.getElementById('gs-prev');
  var nextBtn = document.getElementById('gs-next');
  var counterEl = document.getElementById('gs-counter');
  var restartBtn = document.getElementById('gs-restart');
  var currentScene = 0;

  function clearScreen() { if (hasGsap) gsap.killTweensOf(screen.querySelectorAll('*')); screen.innerHTML = ''; screen.style.opacity = 1; }
  function aFromTo(t, f, to) { if (hasGsap) gsap.fromTo(t, f, to); else if (t && t.style) t.style.opacity = 1; }
  function aTo(t, to) { if (hasGsap) gsap.to(t, to); else if (t && t.style) t.style.opacity = 1; }

  var scenes = [
    /* Scene 1: Meet Mark */
    function() {
      screen.innerHTML =
        '<div class="gs-act-tag">ONCE UPON A TIME</div>' +
        '<div class="gs-act-name">Meet Mark</div>' +
        '<div class="gs-scene-content">' +
          '<img src="assets_clean/mark_walking_worried.png" alt="Mark walking" class="gs-character-image" id="sc1-mark" />' +
          '<div class="gs-caption" id="sc1-caption">Mark, 45, lives in Chicago</div>' +
        '</div>';
      var img = document.getElementById('sc1-mark');
      var cap = document.getElementById('sc1-caption');
      if (!hasGsap) { img.style.opacity = 1; cap.style.opacity = 1; return; }
      gsap.set(cap, { opacity: 0 });
      aFromTo(img, { xPercent: -30, opacity: 0 }, { xPercent: 0, opacity: 1, duration: 0.6, ease: 'power3.out' });
      aFromTo(cap, { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 0.5 });
    },

    /* Scene 2: Heart skipped a beat */
    function() {
      screen.innerHTML =
        '<div class="gs-act-tag">ONCE UPON A TIME</div>' +
        '<div class="gs-act-name">Then one day, his heart skipped a beat</div>' +
        '<div class="gs-scene-content" style="position:relative;">' +
          '<img src="assets_clean/mark_walking_worried.png" alt="Mark worried" class="gs-character-image" id="sc2-mark" />' +
          '<img src="assets_clean/heart_pulse_irregular.png" alt="Irregular heartbeat" class="gs-overlay-heart" id="sc2-heart" style="top:30%;left:60%;" />' +
          '<img src="assets_clean/sticky_palpitations.png" alt="Palpitations sticky note" class="gs-overlay-sticky" id="sc2-sticky" style="top:20%;left:5%;transform:rotate(4deg);" />' +
          '<div class="gs-caption" id="sc2-caption">He started feeling palpitations</div>' +
        '</div>';
      var mark = document.getElementById('sc2-mark');
      var heart = document.getElementById('sc2-heart');
      var sticky = document.getElementById('sc2-sticky');
      var cap = document.getElementById('sc2-caption');
      if (!hasGsap) { mark.style.opacity = 1; heart.style.opacity = 1; sticky.style.opacity = 1; cap.style.opacity = 1; return; }
      gsap.set([heart, sticky, cap], { opacity: 0 });
      aFromTo(mark, { opacity: 0 }, { opacity: 1, duration: 0.4 });
      aFromTo(heart, { opacity: 0 }, { opacity: 1, duration: 0.4, delay: 0.4, onComplete: function() {
        gsap.to(heart, { scale: 1.15, duration: 0.5, ease: 'sine.inOut', repeat: 2, yoyo: true });
      }});
      aFromTo(sticky, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, delay: 1.2, ease: 'back.out(1.7)' });
      aFromTo(cap, { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 1.8 });
    },

    /* Scene 3: Sees cardiologist */
    function() {
      screen.innerHTML =
        '<div class="gs-act-tag">EVERY DAY</div>' +
        '<div class="gs-act-name">So he went to see his cardiologist</div>' +
        '<div class="gs-scene-content">' +

      if (!hasGsap) { img.style.opacity = 1; cap.style.opacity = 1; return; }
      gsap.set(cap, { opacity: 0 });
      aFromTo(img, { xPercent: 30, opacity: 0 }, { xPercent: 0, opacity: 1, duration: 0.6, ease: 'power3.out' });
      aFromTo(cap, { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 0.5 });
    },

    /* Scene 4: Mark wonders about the patch */
    function() {
      screen.innerHTML =
        '<div class="gs-act-tag">EVERY DAY</div>' +
        '<div class="gs-act-name">Mark looked at the patch and wondered...</div>' +
        '<div class="gs-scene-content" style="position:relative;">' +
          '<img src="assets_clean/mark_holding_patch_curious.png" alt="Mark holding patch" class="gs-character-image" id="sc4-mark" />' +
          '<div class="gs-thought-bubble" id="sc4-thought" style="top:5%;left:60%;">What is this thing?</div>' +
        '</div>';
      var img = document.getElementById('sc4-mark');
      var thought = document.getElementById('sc4-thought');
      if (!hasGsap) { img.style.opacity = 1; thought.style.opacity = 1; return; }
      gsap.set(thought, { opacity: 0, scale: 0 });
      aFromTo(img, { opacity: 0 }, { opacity: 1, duration: 0.5 });
      aFromTo(thought, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, delay: 0.6, ease: 'back.out(1.7)' });
    }
  ];

  function goTo(n) {
    if (n < 0 || n >= scenes.length) return;
    currentScene = n; clearScreen(); scenes[n]();
    tlFill.style.width = ((n + 1) / scenes.length * 100) + '%';
    counterEl.textContent = (n + 1) + ' / ' + scenes.length;
    prevBtn.disabled = (n === 0); nextBtn.disabled = (n === scenes.length - 1);
  }
  prevBtn.addEventListener('click', function() { goTo(currentScene - 1); });
  nextBtn.addEventListener('click', function() { goTo(currentScene + 1); });
  restartBtn.addEventListener('click', function() { goTo(0); });
  document.addEventListener('keydown', function(e) {
    var rect = document.getElementById('gs-theater').getBoundingClientRect();
    if (rect.top > window.innerHeight || rect.bottom < 0) return;
    if (e.key === 'ArrowRight') { goTo(currentScene + 1); e.preventDefault(); }

  });
  var fsBtn=document.getElementById('gs-fullscreen-btn');

  var enterFsIcon='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V3h4M21 7V3h-4M3 17v4h4M21 17v4h-4"/></svg>';
  var exitFsIcon='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v4H4M16 3v4h4M8 21v-4H4M16 21v-4h4"/></svg>';

      }else{
        if(document.exitFullscreen)document.exitFullscreen();
        else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
      }
    });
    function updateFsIcon(){var isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);fsBtn.innerHTML=isFs?exitFsIcon:enterFsIcon;fsBtn.setAttribute('title',isFs?'Exit fullscreen':'Fullscreen');}
    document.addEventListener('fullscreenchange',updateFsIcon);
    document.addEventListener('webkitfullscreenchange',updateFsIcon);
  }

  goTo(0);
}
if (typeof gsap !== 'undefined') { initTheater(); }
else { document.addEventListener('gsap-ready', initTheater); }
</script>

        let selectedAnnoteEl;

      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
